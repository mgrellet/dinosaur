spring.application.name=dinosaur

server.port=8080

# OpenAPI / Swagger UI (springdoc);
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.datasource.url=jdbc:postgresql://localhost:5432/dinosaur
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Scheduling

# 10 minutes
#scheduler.cron-expression=0 */10 * * * * 
# 1 minute
scheduler.cron-expression=0 */1 * * * * 

# RabbitMQ
rabbitmq.exchange=dinosaur.exchange
rabbitmq.queue=dinosaur.status.queue
rabbitmq.routing-key=dinosaur.status.routing.key
